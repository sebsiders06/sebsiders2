<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demande envoyée | Formation SST Philippe Clemente</title>
  <meta name="description" content="Votre demande a bien été envoyée à Formation SST Philippe Clemente. Nous vous répondrons rapidement.">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1e3a5f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --white: #ffffff;
      --bg: #f8fafc;
      --bg-card: #ffffff;
      --grey-border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --blue-marine: #1e3a5f;
      --blue-marine-light: #2d4a6f;
      --red-secours: #b91c1c;
      --radius: 8px;
      --shadow: 0 1px 3px rgba(30, 58, 95, 0.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      width: 100%;
      max-width: 720px;
      background: var(--bg-card);
      border: 1px solid var(--grey-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2rem;
      text-align: center;
    }
    h1 {
      margin: 0 0 0.75rem;
      color: var(--blue-marine);
      font-size: clamp(1.75rem, 4vw, 2.25rem);
    }
    p {
      margin: 0 0 1rem;
      color: var(--text-muted);
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.85rem 1.5rem;
      min-height: 44px;
      border-radius: var(--radius);
      background: var(--red-secours);
      color: var(--white);
      text-decoration: none;
      font-weight: 600;
    }
    .btn:hover {
      background: #991b1b;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Demande envoyée</h1>
    <p>Votre message a bien été transmis à Philippe Clemente.</p>
    <p>Une réponse vous sera apportée dans les plus brefs délais.</p>
    <a href="index.html#contact" class="btn">Revenir au site</a>
  </main>
</body>
</html>
